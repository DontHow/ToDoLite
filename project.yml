name: TodoLite
targets:
  TodoLite-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TodoLite
        excludes:
          - "Resources/Info-macOS.plist"
          - "Resources/TodoLite-macOS.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donghao.TodoLite
        PRODUCT_MODULE_NAME: TodoLite
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: 办它
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_ENTITLEMENTS: TodoLite/Resources/TodoLite.entitlements
    info:
      path: TodoLite/Resources/Info.plist
      properties:
        CFBundleVersion: "19"
        CFBundleShortVersionString: "1.19"
        LSRequiresIPhoneOS: YES
    entitlements:
      path: TodoLite/Resources/TodoLite.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.$(CFBundleIdentifier)
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
        com.apple.security.application-groups:
          - group.$(CFBundleIdentifier)

  TodoLite-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TodoLite
        excludes:
          - "Resources/Info.plist"
          - "Resources/TodoLite.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donghao.TodoLite
        PRODUCT_NAME: 办它
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: 办它
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        CODE_SIGN_ENTITLEMENTS: TodoLite/Resources/TodoLite-macOS.entitlements
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
    info:
      path: TodoLite/Resources/Info-macOS.plist
      properties:
        CFBundleVersion: "19"
        CFBundleShortVersionString: "1.19"
        LSMinimumSystemVersion: "14.0"
    entitlements:
      path: TodoLite/Resources/TodoLite-macOS.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.$(CFBundleIdentifier)
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
        com.apple.security.application-groups:
          - group.$(CFBundleIdentifier)

  TodoLiteWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TodoLiteWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donghao.TodoLite.widget
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_CFBundleDisplayName: 办它Widget
    info:
      path: TodoLiteWidget/Info.plist
      properties:
        CFBundleVersion: "19"
        CFBundleShortVersionString: "1.19"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TodoLiteWidget/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.$(CFBundleIdentifier)

  TodoLiteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: TodoLite-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donghao.TodoLiteTests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TodoLite-macOS:
    build:
      targets:
        TodoLite-macOS: all
